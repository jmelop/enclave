services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: enclave
      POSTGRES_PASSWORD: enclave
      POSTGRES_DB: enclave
    volumes:
      - enclave_pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U enclave -d enclave"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - api
    profiles:
      - full

volumes:
  enclave_pgdata:
